services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ftias-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - ftias-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ftias_user} -d ${POSTGRES_DB:-ftias_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ftias-backend
    restart: unless-stopped
    environment:
      # Database (matches backend/app/config.py)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ftias_user}:${POSTGRES_PASSWORD:-ftias_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ftias_db}"
      POSTGRES_USER: ${POSTGRES_USER:-ftias_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ftias_password}
      POSTGRES_DB: ${POSTGRES_DB:-ftias_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      # Application
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      # AI / OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      DOCLING_NUM_THREADS: ${DOCLING_NUM_THREADS:-4}
      DOCLING_FAST_MODE: ${DOCLING_FAST_MODE:-false}
      DOCLING_AUTO_FAST_FOR_LARGE_FILES: ${DOCLING_AUTO_FAST_FOR_LARGE_FILES:-true}
      DOCLING_FAST_THRESHOLD_MB: ${DOCLING_FAST_THRESHOLD_MB:-25}
      DOCLING_TABLE_STRUCTURE: ${DOCLING_TABLE_STRUCTURE:-true}
      DOCLING_MAX_CHUNK_CHARS: ${DOCLING_MAX_CHUNK_CHARS:-5000}
      QUERY_LLM_MODEL: ${QUERY_LLM_MODEL:-gpt-4o-mini}
      QUERY_TOP_K_DEFAULT: ${QUERY_TOP_K_DEFAULT:-8}
      QUERY_CONTEXT_LIMIT: ${QUERY_CONTEXT_LIMIT:-12}
      QUERY_MIN_UNIQUE_DOCUMENTS: ${QUERY_MIN_UNIQUE_DOCUMENTS:-3}
      QUERY_MAX_CHUNKS_PER_DOCUMENT: ${QUERY_MAX_CHUNKS_PER_DOCUMENT:-3}
      QUERY_VECTOR_CANDIDATES: ${QUERY_VECTOR_CANDIDATES:-30}
      QUERY_LEXICAL_CANDIDATES: ${QUERY_LEXICAL_CANDIDATES:-20}
      QUERY_MAX_TOKENS: ${QUERY_MAX_TOKENS:-1800}
      QUERY_TEMPERATURE: ${QUERY_TEMPERATURE:-0.1}
      QUERY_WARNING_CITATION_DENSITY: ${QUERY_WARNING_CITATION_DENSITY:-0.4}
      ANALYSIS_LLM_MODEL: ${ANALYSIS_LLM_MODEL:-gpt-4o-mini}
      ANALYSIS_MAX_TOKENS: ${ANALYSIS_MAX_TOKENS:-2600}
      ANALYSIS_TEMPERATURE: ${ANALYSIS_TEMPERATURE:-0.2}
      ANALYSIS_MIN_CITATION_DENSITY: ${ANALYSIS_MIN_CITATION_DENSITY:-0.75}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ftias-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ftias-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - NODE_ENV=${NODE_ENV:-development}
      - CI=true
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ftias-network
    command: sh -c "pnpm install --config.confirmModulesPurge=false --no-frozen-lockfile && pnpm dev --host 0.0.0.0"
    profiles:
      - frontend

  # pgAdmin (Optional - Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ftias-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ftias-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  backend_cache:
    driver: local

networks:
  ftias-network:
    driver: bridge
